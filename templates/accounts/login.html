{% extends "base.html" %}
{% block title %}Ingresar – Estudio Contable{% endblock %}
{% block content %}
<section class="auth-panel">
  <h1>Ingresar</h1>
  <p class="lede">Accedé con tu cuenta del estudio para gestionar vencimientos.</p>
  <form method="post" class="stack-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn primary">Entrar</button>
  </form>
</section>
{% endblock %}
